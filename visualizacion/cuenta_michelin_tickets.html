<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La cuenta Michelin · Tickets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --cream:#ECE3D0;
  --ink:#2a2320;
  --red:#BD2333;
  --red-deep:#7A1622;
  --gold:#F7B036;
  --goldink:#b07810;
  --line:#c3b394;
  --paper:#fffdf5;
  --muted:#5b4d42;
  --track:#e4d8c4;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--cream);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.cm-section{
  position:relative;
  isolation:isolate;
  width:100%;
  min-height:100vh;
  overflow:hidden;
  padding:clamp(52px,7vh,84px) clamp(34px,6vw,86px) clamp(58px,8vh,92px);
  background:radial-gradient(140% 120% at 50% 4%, #f6efdd 0%, #efe5d0 50%, #ead9bb 100%);
}
.cm-section::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:-1;
  opacity:.38;
  pointer-events:none;
  mix-blend-mode:multiply;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/></svg>");
}
.cm-wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto}
.cm-sep{display:flex;align-items:center;justify-content:center;gap:16px;max-width:620px;margin:0 auto 38px}
.cm-sep .cm-ln{flex:1;height:1px;background:linear-gradient(90deg,transparent,#C8912F);opacity:.65}
.cm-sep .cm-ln:last-child{background:linear-gradient(90deg,#C8912F,transparent)}
.cm-sep .cm-dot{color:#C8912F;font-size:10px;letter-spacing:.3em}
.cm-eyebrow{display:flex;align-items:center;justify-content:center;gap:12px;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:.34em;text-transform:uppercase;font-size:clamp(10.5px,1.2vw,13px);color:var(--red);margin-bottom:18px;text-align:center}
.cm-star-icon{width:20px;height:20px;display:block;flex:0 0 auto;color:var(--red)}
.cm-red{color:var(--red)}
.cm-gold{color:var(--gold)}
.cm-title{font-family:'Playfair Display',serif;font-weight:900;text-align:center;font-size:clamp(40px,6.5vw,76px);line-height:.96;letter-spacing:-.035em;color:#17110e;margin:0 auto 16px;max-width:16ch}
.cm-lead{max-width:920px;margin:0 auto 38px;color:var(--muted);font-size:clamp(15px,1.6vw,18px);line-height:1.55;text-align:center}
.cm-lead b{color:var(--red-deep);font-weight:600}
@media(max-width:900px){
  .cm-section{padding:48px 18px 58px;min-height:auto}
  .cm-title{text-align:left;max-width:100%;font-size:clamp(38px,10vw,58px)}
  .cm-eyebrow,.cm-lead{text-align:left;justify-content:flex-start}
  .cm-sep{margin-bottom:28px}
}


.cm-tickets{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:clamp(18px,2.8vw,32px);align-items:stretch}
.cm-ticket{position:relative;min-height:390px;padding:28px 28px 24px;background:rgba(255,252,245,.86);backdrop-filter:blur(4px);border:1px solid rgba(189,35,51,.30);box-shadow:0 18px 50px rgba(90,60,40,.14);border-radius:6px;transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease}
.cm-ticket:hover{transform:translateY(-5px);box-shadow:0 24px 56px rgba(90,60,40,.20);border-color:rgba(189,35,51,.48)}
.cm-ticket.cm-is-gold:hover{border-color:rgba(247,176,54,.68)}
.cm-ticket::before{content:"";position:absolute;inset:18px;border:1px solid rgba(195,179,148,.76);border-radius:4px;pointer-events:none}
.cm-ticket-head{position:relative;z-index:1;display:flex;align-items:baseline;gap:10px;margin:8px 0 8px;font-family:'Playfair Display',serif;color:#17110e}
.cm-stars-img{display:flex;align-items:center;gap:4px;flex:0 0 auto;transform:translateY(-2px)}
.cm-stars-img svg{width:18px;height:18px;display:block;flex:0 0 auto}
.cm-star-title-text{display:flex;align-items:baseline;gap:7px;line-height:1;white-space:nowrap}
.cm-star-number{font-size:clamp(34px,3.4vw,46px);font-weight:900;letter-spacing:-.05em}
.cm-star-word{font-size:clamp(25px,2.3vw,33px);font-weight:800;letter-spacing:-.035em}
.cm-n-count{position:relative;z-index:1;font-size:12.5px;color:#6b5c52;margin-bottom:14px;font-variant-numeric:tabular-nums}
.cm-dash{position:relative;z-index:1;border-bottom:2px dotted rgba(120,90,50,.28);margin-bottom:14px}
.cm-price-row{position:relative;z-index:1;display:grid;grid-template-columns:68px 1fr 54px;gap:12px;align-items:center;padding:9px 0 12px;border-bottom:1px dotted rgba(120,90,50,.22);border-radius:6px;transition:background .2s ease,transform .2s ease}
.cm-price-row:hover{background:rgba(189,35,51,.045);transform:translateX(3px)}
.cm-price-row:last-child{border-bottom:0}
.cm-price-label{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#221915;white-space:nowrap;letter-spacing:-.03em}
.cm-track{height:16px;background:var(--track);border-radius:999px;overflow:hidden;box-shadow:inset 0 1px 1px rgba(80,50,20,.12)}
.cm-fill{height:100%;width:var(--width);border-radius:999px;background:var(--red);transition:width .7s ease}
.cm-fill.cm-low{background:#cfc6b7}.cm-fill.cm-mid{background:#d66f7a}.cm-fill.cm-high{background:var(--red)}.cm-fill.cm-lux{background:var(--red-deep)}
.cm-is-gold .cm-fill.cm-lux{background:linear-gradient(90deg,var(--gold),#cf7d0c)}
.cm-pct{font-size:14px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:#251b16}
.cm-count{display:block;margin-top:2px;font-size:10px;font-weight:500;color:#7d6b5d}
.cm-profile{position:relative;z-index:1;margin-top:16px;padding-top:17px;border-top:1px solid rgba(120,90,50,.36);text-align:center;font-family:'Playfair Display',serif;font-size:21px;color:#17110e}
.cm-profile strong{color:var(--red);font-weight:800}.cm-is-gold .cm-profile strong{color:var(--goldink)}
@media(max-width:980px){.cm-price-row{grid-template-columns:62px 1fr 48px;gap:8px}.cm-ticket{padding-left:26px;padding-right:26px}.cm-price-label{font-size:20px}}
@media(max-width:900px){.cm-tickets{grid-template-columns:1fr;max-width:500px;margin:0 auto}}
@media(max-width:480px){.cm-price-row{grid-template-columns:68px 1fr 48px}.cm-star-number{font-size:34px}.cm-star-word{font-size:28px}}

</style>
</head>
<body>
<svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
  <symbol id="cm-michelin-star" viewBox="0 0 192 192">
    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="12" d="M95.465 169.996s38.829 1.406 12.322-53.413m-12.322 53.413s-38.827 1.406-12.32-53.413m-52.482 15.83s18.06 34.4 52.482-15.83m-52.482 15.83S10.16 99.41 70.906 95.193m36.881 20.827c32.168 51.703 51.731 18.135 51.731 18.135"/>
    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="12" d="M120.957 95.193c60.501 6.893 38.559 38.963 38.559 38.963"/>
    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="12" d="M30.224 58.455S10.116 91.698 70.907 95.194M30.224 58.455S47.874 23.844 82.89 73.66"/>
    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="12" d="M81.558 24.746c-7.573 5.736-12.679 18.872 1.622 48.916m81.783-1.96c-.684 9.718-8.909 21.583-44.006 23.342"/>
    <path fill="currentColor" d="M117.829 27.777c.938 0 1.841.112 2.66.274 2.714.543 5.163 2.052 6.755 4.317.218.313.42.64.596.976a11.216 11.216 0 0 1 1.241 5.62 11.167 11.167 0 0 1 5.849-1.756c.259 0 .518.014.778.036 2.757.24 5.294 1.601 7.121 3.677 1.528 1.736 3.05 4.234 2.876 7.19.008 12.85-13.715 19.744-32.842 19.744l-.425-.001c-9.798-16.684-10.812-32.198.389-38.681 1.579-1.045 3.343-1.396 5.002-1.396Zm0-11.777c-4.073 0-7.926 1.084-11.173 3.139-6.364 3.773-10.724 9.56-12.619 16.757-2.841 10.786.01 23.9 8.245 37.922l3.393 5.777 6.699.036.488.001c11.706 0 21.888-2.285 29.445-6.608C152 67.48 157.379 58.751 157.48 48.42c.217-5.434-1.787-10.71-5.811-15.281-3.867-4.395-9.137-7.098-14.844-7.62-3.311-4.669-8.288-7.87-14.028-9.016a25.576 25.576 0 0 0-4.968-.503Z"/>
  </symbol>
</svg>
<section class="cm-section" id="cm-tickets-section">
  <div class="cm-wrap">
    <div class="cm-sep"><span class="cm-ln"></span><span class="cm-dot">◆</span><span class="cm-ln"></span></div>
    <div class="cm-eyebrow">
      <svg class="cm-star-icon cm-red" aria-hidden="true"><use href="#cm-michelin-star"></use></svg>
      <span>La entrada — estrellas & precio</span>
    </div>
    <h1 class="cm-title">¿Subir una estrella también sube la cuenta?</h1>
    <p class="cm-lead">A medida que suben las estrellas, también cambia la cuenta: entre los restaurantes de <b>2 y 3 estrellas</b>, casi todos caen en la categoría de precio más alta.</p>
    <div class="cm-tickets" id="cm-tickets"></div>
  </div>
</section>

<script>
(function(){
  const data = [
    {stars:1,n:3144,profile:'Más diverso',gold:false,rows:[
      ['€',0.1,3,'low'],['€€',2.9,91,'mid'],['€€€',34.6,1088,'high'],['€€€€',62.4,1962,'lux']
    ]},
    {stars:2,n:540,profile:'Alto',gold:false,rows:[
      ['€',0.0,0,'low'],['€€',0.4,2,'mid'],['€€€',6.1,33,'high'],['€€€€',93.5,505,'lux']
    ]},
    {stars:3,n:157,profile:'Lujo',gold:true,rows:[
      ['€',0.0,0,'low'],['€€',0.0,0,'mid'],['€€€',3.8,6,'high'],['€€€€',96.2,151,'lux']
    ]}
  ];

  const tickets = document.getElementById('cm-tickets');
  tickets.innerHTML = data.map(d => `
    <article class="cm-ticket ${d.gold ? 'cm-is-gold' : ''}">
      <div class="cm-ticket-head">
        <span class="cm-stars-img">
          ${Array.from({length:d.stars}).map(() => `<svg class="${d.gold ? 'cm-gold' : 'cm-red'}" aria-hidden="true"><use href="#cm-michelin-star"></use></svg>`).join('')}
        </span>
        <span class="cm-star-title-text">
          <span class="cm-star-number">${d.stars}</span>
          <span class="cm-star-word">${d.stars === 1 ? 'estrella' : 'estrellas'}</span>
        </span>
      </div>
      <div class="cm-n-count">${d.n.toLocaleString('es-AR')} restaurantes en esta categoría</div>
      <div class="cm-dash"></div>
      ${d.rows.map(([label,pct,count,cls]) => `
        <div class="cm-price-row" title="${pct.toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1})}% · ${count.toLocaleString('es-AR')} restaurantes">
          <div class="cm-price-label">${label}</div>
          <div class="cm-track"><div class="cm-fill cm-${cls}" style="--width:${pct}%"></div></div>
          <div class="cm-pct">${pct.toLocaleString('es-AR',{minimumFractionDigits:1,maximumFractionDigits:1})}%<span class="cm-count">${count.toLocaleString('es-AR')}</span></div>
        </div>`).join('')}
      <div class="cm-profile">Perfil: <strong>${d.profile}</strong></div>
    </article>
  `).join('');
})();
</script>

</body>
</html>
